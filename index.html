<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="color-panel">
        <button id="color-red" onclick="changecolor('red')">Red</button>
        <button id="color-green" onclick="changecolor('green')">Green</button>
        <button id="color-blue" onclick="changecolor('blue')">Blue</button>
        <button id="color-yellow" onclick="changecolor('yellow')">Yellow</button>
        <button id="color-cyan" onclick="changecolor('cyan')">Cyan</button>
    </div>
    <div id="custom-color-section">
    <input type="color" id="color-picker" value="#ff0000">
    <input type="text" id="color-name" placeholder="Enter color name...">
    <button onclick="addCustomColor()">Add Color</button>
</div>
    
</body>
<script>
   // Change background color
function changeColor(button) {
    const bgColor = window.getComputedStyle(button).backgroundColor;
    document.body.style.backgroundColor = bgColor;
}

// Add custom color to panel
function addCustomColor() {
    // Get input values
    const colorPicker = document.getElementById("color-picker");
    const colorNameInput = document.getElementById("color-name");
    
    const colorValue = colorPicker.value;
    const colorName = colorNameInput.value;
    
    // Validation - check if name is entered
    if (colorName === "") {
        alert("Please enter a color name!");
        return;
    }
    
    // Create new button
    const newButton = document.createElement("button");
    newButton.textContent = colorName;
    newButton.style.backgroundColor = colorValue;
    newButton.style.width = "80px";
    newButton.style.height = "50px";
    newButton.style.borderRadius = "10px";
    newButton.style.border = "none";
    newButton.style.fontSize = "16px";
    newButton.style.fontWeight = "bold";
    newButton.style.marginTop = "15px";
    newButton.style.cursor = "pointer";
    
    // Set text color based on brightness
    if (isLightColor(colorValue)) {
        newButton.style.color = "black";
    } else {
        newButton.style.color = "white";
    }
    
    // Add click functionality
    newButton.onclick = function() {
        changeColor(this);
    };
    
    // Add button to color panel
    document.getElementById("color-panel").appendChild(newButton);
    
    // Clear input field
    colorNameInput.value = "";
}

// Check if color is light or dark
function isLightColor(hex) {
    // Convert hex to RGB
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    
    // Calculate brightness
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    
    return brightness > 128;
}
</script>
</html>
